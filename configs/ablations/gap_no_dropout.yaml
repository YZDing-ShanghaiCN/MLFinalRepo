experiment:
  name: gap_no_dropout
  output_dir: ../outputs/ablation/gap_no_dropout
  seed: 42

base_configs:
  train: configs/train.yaml
  model: configs/model.yaml
  dataset: configs/dataset.yaml
  validation_split: configs/validation_split.yaml

model:
  pooling_type: gap
  dropout: 0.0

training:
  learning_rate: 0.004
  batch_size: 32
  epochs: 30

data:
  train_manifest: metadata/manifests/train_sub.csv
  val_manifest: metadata/manifests/val.csv
  class_mapping: metadata/class_to_idx.json
