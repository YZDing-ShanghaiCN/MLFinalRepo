experiment:
  name: baseline_cnn_gap
  output_dir: ../outputs/experiments1/final
  seed: 42

data:
  train_manifest: metadata/manifests/train_sub.csv
  val_manifest: metadata/manifests/val.csv
  test_manifest: metadata/manifests/test.csv
  class_mapping: metadata/class_to_idx.json
  train_batch_size: 32
  val_batch_size: 64
  test_batch_size: 64
  num_workers: 0
  pin_memory: false

training:
  device: auto
  epochs: 30
  learning_rate: 0.004  
  weight_decay: 0.0001
  gradient_clip_norm: 5.0
  early_stopping_patience: 30
  monitor: val_macro_f1
  monitor_mode: max

optimizer:
  type: adamw

loss:
  type: cross_entropy
  label_smoothing: 0.1
  use_class_weights: false

scheduler:
  type: reduce_on_plateau
  factor: 0.5
  patience: 2
  min_lr: 0.000001

checkpoint:
  save_best: true
  save_last: true
