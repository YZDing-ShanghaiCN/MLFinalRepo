dataset:
  root: ../rgbd-dataset_eval
  input_size: 128
  num_classes: 13

image:
  extensions:
    - .png
    - .jpg
    - .jpeg
    - .bmp
  required_keywords:
    - crop
  excluded_keywords:
    - depth
    - mask

preprocess:
  longest_side: 128
  padding_mode: center
  padding_value:
    - 0
    - 0
    - 0
  interpolation: bilinear
  normalize: false

dataloader:
  train_batch_size: 32
  test_batch_size: 64
  num_workers: 0
  pin_memory: false
  shuffle_train: true
  shuffle_test: false
  seed: 2026
